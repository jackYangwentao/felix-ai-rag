server:
  port: 8080

spring:
  application:
    name: felix-ai-rag

# LangChain4J Configuration
langchain4j:
  ollama:
    base-url: http://localhost:11434
    chat-model:
      model-name: llama3.1
      temperature: 0.7
      timeout: 60s
    embedding-model:
      model-name: nomic-embed-text
      timeout: 60s

# RAG Configuration
rag:
  chunk-size: 500
  chunk-overlap: 50
  max-results: 5
  min-score: 0.7

# Logging
logging:
  level:
    dev.langchain4j: DEBUG
    com.felix.ai.rag: DEBUG
