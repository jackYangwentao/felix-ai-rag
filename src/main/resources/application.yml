server:
  port: 8080

spring:
  application:
    name: felix-ai-rag

# LangChain4J Configuration
langchain4j:
  ollama:
    base-url: http://localhost:11434
    chat-model:
      model-name: llama3.2
      temperature: 0.7
      timeout: 60s
    embedding-model:
      model-name: nomic-embed-text
      timeout: 60s

# RAG Configuration - 参考LangChain最佳实践
rag:
  chunk-size: 1000        # 文档分块大小（参考文档使用4000，本地模型建议用较小值）
  chunk-overlap: 200      # 分块重叠大小（保持上下文连贯性）
  max-results: 3          # 检索结果数量（参考文档取Top-3）
  min-score: 0.7          # 最小相似度分数
  embedding-dimension: 768  # 嵌入向量维度 (nomic-embed-text = 768, text-embedding-3-small = 1536)

  # 分块策略配置
  # 支持的策略: recursive(默认), fixed, semantic, code, sentence-window
  chunk:
    strategy: recursive   # 分块策略: recursive | fixed | semantic | code | sentence-window
    size: 1000           # 分块大小
    overlap: 200         # 分块重叠
    separator: ""        # 固定大小分块的分隔符（为空时使用 "\n\n"）

    # 语义分块配置（strategy: semantic）
    semantic:
      threshold-type: percentile      # 断点识别方法: percentile | standard_deviation | interquartile
      threshold-amount: 95.0          # 阈值数值
      buffer-size: 1                  # 上下文缓冲大小

    # 句子窗口配置（strategy: sentence-window）
    # 核心思想：为检索精确性而索引小块（句子），为上下文丰富性而检索大块（窗口）
    sentence-window:
      size: 3              # 窗口大小：前后各N个句子

  # 句子窗口后处理器配置
  sentence-window:
    enabled: true          # 是否启用句子窗口后处理（检索后替换为完整窗口）

  # 向量存储配置
  # 支持的类型: memory(默认), redis, chroma, qdrant, pgvector
  vector-store:
    type: memory

    # Redis 配置 (type: redis)
    redis:
      host: localhost
      port: 6379
      index-name: rag-index

    # Chroma 配置 (type: chroma)
    chroma:
      base-url: http://localhost:8000
      collection-name: rag-collection

    # Qdrant 配置 (type: qdrant)
    qdrant:
      host: localhost
      port: 6334
      collection-name: rag-collection

    # PGVector 配置 (type: pgvector)
    pgvector:
      host: localhost
      port: 5432
      database: postgres
      user: postgres
      password: postgres
      table: embedding_store

  # 多模态配置
  multimodal:
    enabled: true                 # 是否启用多模态功能
    vision-model: llava           # 视觉模型名称 (llava, llava-phi3, bakllava 等)

  # 搜索配置
  search:
    rerank: false                 # 是否默认启用重排序（会增加响应时间）

  # 重排序配置
  reranker:
    enabled: true                 # 是否启用重排序功能
    top-k: 5                      # 重排序后返回的结果数

  # 混合检索配置 (BM25 + 向量检索)
  hybrid-retriever:
    vector-weight: 0.7            # 向量检索权重 (0-1)
    keyword-weight: 0.3           # 关键词检索权重 (0-1)
    rrf-k: 60                     # RRF融合公式的k参数
    max-results: 5                # 默认返回结果数
    min-score: 0.5                # 最小相似度分数

  # 查询扩展配置
  query-expansion:
    enabled: true                 # 是否启用查询扩展
    variations: 3                 # 生成的查询变体数量
    hyde:
      enabled: false              # 是否启用HyDE（会增加一次LLM调用）

  # 查询重写配置
  # 参考 Datawhale All-In-RAG 查询重写章节
  query-rewrite:
    enabled: true                 # 是否启用查询重写
    intent-analysis: true         # 是否进行意图分析

    # 多查询分解配置
    multi-query:
      enabled: true               # 启用多查询分解
      variations: 3               # 生成的子查询数量

    # 退步提示配置
    step-back:
      enabled: true               # 启用退步提示

    # HyDE配置
    hyde:
      enabled: false              # 启用HyDE（会增加LLM调用和嵌入计算）

  # 高级混合检索配置 (稠密检索 + 稀疏检索)
  # 参考 Datawhale All-In-RAG 混合搜索章节
  advanced-hybrid:
    strategy: RRF                 # 融合策略: RRF (Reciprocal Rank Fusion) | WEIGHTED_SUM
    vector-weight: 0.5            # 稠密检索权重 (0-1)
    keyword-weight: 0.5           # 稀疏检索权重 (0-1)
    rrf-k: 60                     # RRF公式中的k参数（平滑常数）
    max-results: 5                # 默认返回结果数
    min-score: 0.5                # 最小相似度分数

    # BM25参数调优
    bm25:
      k1: 1.5                     # 词频饱和参数（通常1.2-2.0）
      b: 0.75                     # 长度归一化参数（通常0.5-1.0）

  # 优化版RAG配置
  optimized:
    use-query-rewrite: true       # 启用查询重写
    use-query-expansion: false    # 启用查询扩展（会增加LLM调用）
    use-hybrid-retrieval: true    # 启用混合检索
    use-sentence-window: true     # 启用句子窗口
    use-rerank: false             # 启用重排序（会增加LLM调用）

  # Self-Query配置
  # 参考 Datawhale All-In-RAG 查询构建章节
  self-query:
    enabled: true                 # 启用Self-Query检索

# Logging
logging:
  level:
    dev.langchain4j: DEBUG
    com.felix.ai.rag: DEBUG
