server:
  port: 8080

spring:
  application:
    name: felix-ai-rag

# LangChain4J Configuration
langchain4j:
  ollama:
    base-url: http://localhost:11434
    chat-model:
      model-name: llama3.2
      temperature: 0.7
      timeout: 60s
    embedding-model:
      model-name: nomic-embed-text
      timeout: 60s

# RAG Configuration - 参考LangChain最佳实践
rag:
  chunk-size: 1000        # 文档分块大小（参考文档使用4000，本地模型建议用较小值）
  chunk-overlap: 200      # 分块重叠大小（保持上下文连贯性）
  max-results: 3          # 检索结果数量（参考文档取Top-3）
  min-score: 0.7          # 最小相似度分数
  embedding-dimension: 768  # 嵌入向量维度 (nomic-embed-text = 768, text-embedding-3-small = 1536)

  # 分块策略配置
  # 支持的策略: recursive(默认), fixed, semantic, code
  chunk:
    strategy: recursive   # 分块策略: recursive | fixed | semantic | code
    size: 1000           # 分块大小
    overlap: 200         # 分块重叠
    separator: ""        # 固定大小分块的分隔符（为空时使用 "\n\n"）

    # 语义分块配置（strategy: semantic）
    semantic:
      threshold-type: percentile      # 断点识别方法: percentile | standard_deviation | interquartile
      threshold-amount: 95.0          # 阈值数值
      buffer-size: 1                  # 上下文缓冲大小

  # 向量存储配置
  # 支持的类型: memory(默认), redis, chroma, qdrant, pgvector
  vector-store:
    type: memory

    # Redis 配置 (type: redis)
    redis:
      host: localhost
      port: 6379
      index-name: rag-index

    # Chroma 配置 (type: chroma)
    chroma:
      base-url: http://localhost:8000
      collection-name: rag-collection

    # Qdrant 配置 (type: qdrant)
    qdrant:
      host: localhost
      port: 6334
      collection-name: rag-collection

    # PGVector 配置 (type: pgvector)
    pgvector:
      host: localhost
      port: 5432
      database: postgres
      user: postgres
      password: postgres
      table: embedding_store

  # 多模态配置
  multimodal:
    enabled: true                 # 是否启用多模态功能
    vision-model: llava           # 视觉模型名称 (llava, llava-phi3, bakllava 等)

# Logging
logging:
  level:
    dev.langchain4j: DEBUG
    com.felix.ai.rag: DEBUG
